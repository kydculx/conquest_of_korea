<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>찜! 대모험 - 푸시 알림 테스터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@300..700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #121824;
      --panel-bg: rgba(26, 34, 50, 0.92);
      --panel-border: rgba(35, 45, 63, 0.8);
      --border-color: #232d3f;
      --border-focus: #00e5ff;
      --text-color: #eceff1;
      --text-muted: #90a4ae;
      --primary: #00e5ff;
      --primary-hover: #00b8d4;
      --accent: #ff17ab;
      --accent-hover: #d500f9;
      --success: #00e676;
      --error: #ff17ab;
      --warning: #ffd600;
      --font-family: 'Fredoka', 'Quicksand', 'Noto Sans KR', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, rgba(0, 229, 255, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(255, 23, 171, 0.05) 0px, transparent 50%);
      color: var(--text-color);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* 헤더 스타일 (인게임 다크 젤리 카드 느낌) */
    header {
      text-align: center;
      margin-bottom: 0.5rem;
      border: 2px solid var(--panel-border);
      border-radius: 24px;
      padding: 2.5rem;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.24);
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #00e5ff 0%, #ff17ab 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.55rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 500;
    }

    /* 격자 레이아웃 */
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 968px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* 패널 카드 (귀엽고 둥글둥글한 모던 디자인) */
    .panel {
      background-color: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 28px;
      padding: 2.25rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
      backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .panel:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px rgba(0, 229, 255, 0.05);
      border-color: rgba(0, 229, 255, 0.3);
    }

    .panel-title {
      font-size: 1.3rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--text-color);
    }

    /* 폼 요소 */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    input, select, textarea {
      background-color: #161f30;
      border: 2px solid #232d3f;
      border-radius: 16px;
      color: var(--text-color);
      font-family: var(--font-family);
      padding: 0.85rem 1.15rem;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      width: 100%;
      font-weight: 600;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.15);
      background-color: #1a2538;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
      line-height: 1.5;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    /* 플레이어 목록 영역 */
    .agent-selector-container {
      max-height: 250px;
      overflow-y: auto;
      border: 2px solid var(--border-color);
      border-radius: 16px;
      background-color: #151e2c;
    }

    /* 스크롤바 커스텀 */
    .agent-selector-container::-webkit-scrollbar,
    .console-screen::-webkit-scrollbar {
      width: 6px;
    }
    .agent-selector-container::-webkit-scrollbar-track,
    .console-screen::-webkit-scrollbar-track {
      background: transparent;
    }
    .agent-selector-container::-webkit-scrollbar-thumb,
    .console-screen::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
    }
    .agent-selector-container::-webkit-scrollbar-thumb:hover,
    .console-screen::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 229, 255, 0.2);
    }

    .agent-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .agent-item:hover {
      background-color: #1a2536;
    }

    .agent-item.selected {
      background-color: rgba(0, 229, 255, 0.08);
      border-left: 4px solid var(--primary);
    }

    .agent-info {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .agent-nickname {
      font-weight: 800;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-color);
    }

    .agent-uuid {
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .status-badge {
      font-size: 0.65rem;
      font-weight: 800;
      padding: 0.15rem 0.45rem;
      border-radius: 8px;
      text-transform: uppercase;
    }

    .status-badge.enabled {
      background-color: rgba(0, 230, 118, 0.12);
      color: #00e676;
      border: 1px solid rgba(0, 230, 118, 0.2);
    }

    .status-badge.disabled {
      background-color: rgba(255, 23, 171, 0.12);
      color: #ff17ab;
      border: 1px solid rgba(255, 23, 171, 0.2);
    }

    /* 버튼 스타일 (버블 푸프 3D 스타일) */
    .btn {
      background: linear-gradient(135deg, #00e5ff 0%, #0099ff 100%);
      color: #121824;
      border: none;
      border-radius: 16px;
      font-weight: 800;
      font-size: 1.05rem;
      padding: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.55rem;
      box-shadow: 0 6px 18px rgba(0, 229, 255, 0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 229, 255, 0.35);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn.accent {
      background: linear-gradient(135deg, #ff17ab 0%, #d500f9 100%);
      color: white;
      box-shadow: 0 6px 18px rgba(255, 23, 171, 0.2);
    }

    .btn.accent:hover {
      box-shadow: 0 8px 24px rgba(255, 23, 171, 0.35);
    }

    .btn:disabled {
      background: #232d3f !important;
      color: #546e7a !important;
      cursor: not-allowed;
      box-shadow: none !important;
      transform: none !important;
      border: 1px solid #37474f;
    }

    /* 콘솔 모니터 (아기자기한 로그 메시지 패널) */
    .console-wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .console-screen {
      background-color: #151e2c;
      border: 2px solid var(--border-color);
      border-radius: 20px;
      font-family: var(--font-family);
      padding: 1.5rem;
      flex-grow: 1;
      min-height: 400px;
      max-height: 490px;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #cfd8dc;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
      font-weight: 500;
    }

    .console-log-line {
      margin-bottom: 0.6rem;
      word-break: break-all;
      border-left: 3px solid #37474f;
      padding-left: 0.5rem;
    }

    .console-log-line.system {
      color: var(--text-muted);
      border-left-color: #37474f;
    }

    .console-log-line.error {
      color: #ff17ab;
      font-weight: 700;
      border-left-color: #ff17ab;
    }

    .console-log-line.success {
      color: #00e676;
      font-weight: 700;
      border-left-color: #00e676;
    }

    .console-log-line.warning {
      color: #ffd600;
      font-weight: 700;
      border-left-color: #ffd600;
    }

    .btn-clear {
      background: transparent;
      border: 2px solid var(--border-color);
      color: var(--text-muted);
      border-radius: 12px;
      font-size: 0.75rem;
      padding: 0.4rem 0.85rem;
      cursor: pointer;
      align-self: flex-end;
      transition: all 0.2s ease;
      font-weight: 700;
    }

    .btn-clear:hover {
      color: var(--text-color);
      border-color: var(--primary);
      background-color: #1a2536;
    }

    /* 로더 스피너 */
    .spinner {
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top: 2px solid var(--primary);
      width: 18px;
      height: 18px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>🍭 찜! 대모험</h1>
      <p>플레이어들을 위한 푸시 알림 테스트 콘솔 (FCM Console)</p>
    </header>

    <div class="grid">
      <!-- 폼 패널 -->
      <div class="panel">
        <h2 class="panel-title">1. 대상 설정 및 알림 구성</h2>

        <!-- 인증 및 서버 정보 설정 -->
        <div class="row">
          <div class="form-group">
            <label for="supabaseUrl">Supabase URL</label>
            <input type="text" id="supabaseUrl" value="https://aojbgfdwqlcveffsushg.supabase.co">
          </div>
          <div class="form-group">
            <label for="anonKey">API Key (Anon Key)</label>
            <input type="password" id="anonKey" value="sb_publishable_L3mPqH_ppkHkPf93dennYQ_EuALXjnG">
          </div>
        </div>

        <!-- 실시간 플레이어 목록 드롭 선택기 -->
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem;">
            <label>플레이어 데이터베이스 (실시간)</label>
            <button class="btn-clear" id="btnFetchAgents" style="padding: 0.15rem 0.5rem; font-size: 0.75rem;">플레이어 목록 새로고침</button>
          </div>
          <div class="agent-selector-container" id="agentListContainer">
            <div style="padding: 1.5rem; text-align: center; color: var(--text-muted);">
              플레이어 데이터를 로딩하는 중입니다...
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="targetTopic">대상 수신 토픽 (Topic)</label>
          <input type="text" id="targetTopic" placeholder="예: user_사용자UUID 또는 team_red">
          <span style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">* 상단 목록에서 플레이어를 선택하면 자동으로 해당 플레이어의 개인 토픽이 구성됩니다.</span>
        </div>

        <!-- 알림 템플릿 정보 구성 -->
        <div class="row">
          <div class="form-group">
            <label for="notifType">알림 타입 (Type)</label>
            <select id="notifType">
              <option value="satellite_complete">영토 점령 (satellite_complete)</option>
              <option value="territory_attack">영토 피탈 (territory_attack)</option>
              <option value="system_notice">공지사항 (system_notice)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="tileId">임의 타일 ID (Tile ID)</label>
            <input type="text" id="tileId" value="hex_46_-123">
          </div>
        </div>

        <div class="form-group">
          <label for="notifTitle">알림 제목 (Title)</label>
          <input type="text" id="notifTitle" value="📡 영토 점령 완료">
        </div>

        <div class="form-group">
          <label for="notifBody">알림 본문 (Body)</label>
          <textarea id="notifBody">플레이어님, 타깃 구역에 대한 영토 점령이 성공적으로 완료되었습니다.</textarea>
        </div>

        <button class="btn accent" id="btnSendPush">
          <span>푸시 알림 전송하기</span>
        </button>
      </div>

      <!-- 콘솔 모니터 패널 -->
      <div class="panel">
        <div class="console-wrapper">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
            <h2 class="panel-title accent">2. 실시간 모니터링 로그</h2>
            <button class="btn-clear" id="btnClearConsole">로그 청소</button>
          </div>
          <div class="console-screen" id="consoleScreen">
            <div class="console-log-line system">[SYSTEM] 테스트 터미널이 대기 중입니다.</div>
            <div class="console-log-line system">[SYSTEM] '플레이어 목록 새로고침'을 눌러 실시간 동기화 상태를 가져오거나 푸시 발송을 개시하십시오.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const supabaseUrlInput = document.getElementById('supabaseUrl');
    const anonKeyInput = document.getElementById('anonKey');
    const agentListContainer = document.getElementById('agentListContainer');
    const targetTopicInput = document.getElementById('targetTopic');
    const notifTypeSelect = document.getElementById('notifType');
    const tileIdInput = document.getElementById('tileId');
    const notifTitleInput = document.getElementById('notifTitle');
    const notifBodyInput = document.getElementById('notifBody');
    const btnSendPush = document.getElementById('btnSendPush');
    const btnFetchAgents = document.getElementById('btnFetchAgents');
    const btnClearConsole = document.getElementById('btnClearConsole');
    const consoleScreen = document.getElementById('consoleScreen');

    let selectedAgentId = null;

    // 콘솔에 메시지 출력 함수
    function log(message, type = 'system') {
      const line = document.createElement('div');
      line.classList.add('console-log-line', type);
      const now = new Date().toLocaleTimeString();
      line.innerText = `[${now}] ${message}`;
      consoleScreen.appendChild(line);
      consoleScreen.scrollTop = consoleScreen.scrollHeight;
    }

    // 알림 타입 변경 시 기본 타이틀/본문 연동
    notifTypeSelect.addEventListener('change', () => {
      const type = notifTypeSelect.value;
      if (type === 'satellite_complete') {
        notifTitleInput.value = '📡 영토 점령 완료';
        notifBodyInput.value = '플레이어님, 타깃 구역에 대한 영토 점령이 성공적으로 완료되었습니다.';
      } else if (type === 'territory_attack') {
        notifTitleInput.value = '⚠️ 영토 피탈 감지';
        notifBodyInput.value = '플레이어님, 소유하고 계신 영토가 적에게 공격받거나 피탈당했습니다. 즉시 상황을 파악하십시오.';
      } else if (type === 'system_notice') {
        notifTitleInput.value = '📢 시스템 공지사항';
        notifBodyInput.value = '시스템 공지사항이 등록되었습니다. 최신 패치 및 공지 세부 사항을 파악하십시오.';
      }
    });

    // 콘솔 청소
    btnClearConsole.addEventListener('click', () => {
      consoleScreen.innerHTML = '<div class="console-log-line system">[SYSTEM] 로그가 리셋되었습니다.</div>';
    });

    // 실시간 Profiles 조회
    async function fetchAgents() {
      const url = supabaseUrlInput.value.trim();
      const key = anonKeyInput.value.trim();

      if (!url || !key) {
        log('오류: Supabase URL 및 API Key를 명확히 작성하십시오.', 'error');
        return;
      }

      log('DB profiles 플레이어 정보 동기화 요청 중...');
      agentListContainer.innerHTML = '<div style="padding: 1.5rem; text-align: center; color: var(--text-muted);"><span class="spinner" style="display:inline-block; margin-right:8px; vertical-align:middle;"></span>플레이어를 불러오는 중...</div>';

      try {
        const response = await fetch(`${url}/rest/v1/profiles?select=id,nickname,is_notifications_enabled,notif_territory_attack,notif_satellite_complete,notif_system_notice&order=nickname.asc`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${key}`,
            'apikey': key,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP 에러: ${response.status}`);
        }

        const agents = await response.json();
        agentListContainer.innerHTML = '';

        if (agents.length === 0) {
          agentListContainer.innerHTML = '<div style="padding: 1.5rem; text-align: center; color: var(--text-muted);">조회된 플레이어가 존재하지 않습니다.</div>';
          log('동기화 완료: 플레이어 정보가 DB에 존재하지 않습니다.', 'warning');
          return;
        }

        agents.forEach(agent => {
          const item = document.createElement('div');
          item.classList.add('agent-item');
          if (selectedAgentId === agent.id) {
            item.classList.add('selected');
          }

          const isEnabled = agent.is_notifications_enabled !== false;
          const statusText = isEnabled ? '수신 중' : '수신 거부';
          const statusClass = isEnabled ? 'enabled' : 'disabled';

          item.innerHTML = `
            <div class="agent-info">
              <div class="agent-nickname">
                ${agent.nickname || '무명 플레이어'}
                <span class="status-badge ${statusClass}">${statusText}</span>
              </div>
              <div class="agent-uuid">${agent.id}</div>
            </div>
          `;

          item.addEventListener('click', () => {
            document.querySelectorAll('.agent-item').forEach(el => el.classList.remove('selected'));
            item.classList.add('selected');
            selectedAgentId = agent.id;
            targetTopicInput.value = `user_${agent.id}`;
            log(`선택된 플레이어: ${agent.nickname || '무명 플레이어'} (토픽: user_${agent.id} 설정 완료)`);
            
            if (!isEnabled) {
              log(`⚠️ 주의: ${agent.nickname} 플레이어는 현재 '수신 거부' 상태입니다. 전송 시 필터링이 가동됩니다.`, 'warning');
            }
          });

          agentListContainer.appendChild(item);
        });

        log(`동기화 완료: 총 ${agents.length}명의 플레이어 정보를 탑재했습니다.`, 'success');

      } catch (err) {
        agentListContainer.innerHTML = '<div style="padding: 1.5rem; text-align: center; color: var(--error);">플레이어 로딩 실패</div>';
        log(`동기화 오류: ${err.message}`, 'error');
      }
    }

    // 푸시 전송 처리
    async function sendPush() {
      const url = supabaseUrlInput.value.trim();
      const key = anonKeyInput.value.trim();
      const topic = targetTopicInput.value.trim();
      const title = notifTitleInput.value.trim();
      const body = notifBodyInput.value.trim();
      const type = notifTypeSelect.value;
      const tileId = tileIdInput.value.trim();

      if (!url || !key) {
        log('전송 취소: Supabase URL 및 API Key는 무조건 채워야 합니다.', 'error');
        return;
      }
      if (!topic) {
        log('전송 취소: 대상 수신 토픽(Topic)을 작성하거나 상단 플레이어를 골라주십시오.', 'error');
        return;
      }

      btnSendPush.disabled = true;
      const originalText = btnSendPush.innerHTML;
      btnSendPush.innerHTML = '<span class="spinner"></span> <span>푸시 알림 전송 중...</span>';

      log(`[FCM 전송 요청] 토픽: ${topic} | 타입: ${type} 발송 요청 개시...`);

      try {
        const response = await fetch(`${url}/functions/v1/send-push`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${key}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            topic: topic,
            title: title,
            body: body,
            data_payload: {
              type: type,
              tile_id: tileId
            }
          })
        });

        const resData = await response.json();
        
        if (!response.ok) {
          throw new Error(resData.error || `HTTP 에러 status: ${response.status}`);
        }

        if (resData.success) {
          if (resData.filtered) {
            log(`[전송 필터링 감지] 사유: ${resData.reason} (플레이어가 알림을 꺼서 차단 처리됨)`, 'warning');
          } else {
            log(`[FCM 발송 대성공] FCM ID: ${resData.result.name}`, 'success');
          }
          log(`JSON Response:\n${JSON.stringify(resData, null, 2)}`, 'system');
        } else {
          log(`[발송 에러]: ${resData.error || '알 수 없는 전송 실패'}`, 'error');
        }

      } catch (err) {
        log(`네트워크/통신 장애 에러: ${err.message}`, 'error');
      } finally {
        btnSendPush.disabled = false;
        btnSendPush.innerHTML = originalText;
      }
    }

    // 초기 이벤트 연계
    btnFetchAgents.addEventListener('click', fetchAgents);
    btnSendPush.addEventListener('click', sendPush);

    // 페이지 로딩 완료 즉시 플레이어 데이터 동기화
    window.addEventListener('DOMContentLoaded', fetchAgents);
  </script>
</body>
</html>
